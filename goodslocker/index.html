<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>グッズロッカー</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
            background: radial-gradient(circle at center, #262626 0%, #0d0d0d 72%);
            color: #fff
        }

        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden
        }

        .screen::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(170, 0, 0, .18), rgba(70, 0, 0, .36) 60%, rgba(0, 0, 0, .6));
            opacity: 0;
            transition: opacity .16s ease-out;
        }

        .locked::before {
            opacity: 1
        }

        .title {
            position: absolute;
            top: 14px;
            left: 16px;
            font-size: 13px;
            font-weight: 700;
            opacity: .18;
            letter-spacing: .06em
        }

        .corner-hint {
            position: absolute;
            right: 10px;
            bottom: 8px;
            font-size: 11px;
            opacity: .15
        }

        .tap-guide {
            position: absolute;
            z-index: 9;
            font-size: clamp(22px, 5vw, 34px);
            font-weight: 700;
            color: rgba(255, 255, 255, .96);
            text-align: center;
            line-height: 1.5;
            letter-spacing: .04em;
            opacity: 1;
            transform: scale(1);
            transition: opacity .14s ease, transform .14s ease;
            text-shadow: 0 2px 10px rgba(0, 0, 0, .45);
            pointer-events: none;
        }

        .locked .tap-guide {
            opacity: 0;
            transform: scale(.96);
        }

        .goods-lock {
            position: relative;
            z-index: 10;
            font-size: clamp(84px, 18vw, 170px);
            font-weight: 900;
            line-height: .9;
            text-align: center;
            color: #ffffff;
            opacity: 0;
            transform: scale(.3);
            letter-spacing: .02em;
            will-change: transform, opacity;

            text-shadow:
                -3px -3px 0 #a31212,
                3px -3px 0 #a31212,
                -3px 3px 0 #a31212,
                3px 3px 0 #a31212,
                0 0 12px rgba(255, 60, 60, .55),
                0 6px 16px rgba(0, 0, 0, .55);
        }

        .locked .goods-lock {
            opacity: 1;
            animation: slam .22s cubic-bezier(.25, 1.3, .35, 1) forwards, pulse .9s ease-in-out .4s infinite
        }

        @keyframes slam {
            0% {
                transform: scale(2.1);
                opacity: 0
            }

            60% {
                transform: scale(.85);
                opacity: 1
            }

            80% {
                transform: scale(1.1)
            }

            100% {
                transform: scale(1)
            }
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1)
            }

            50% {
                transform: scale(1.03)
            }
        }

        .vine-layer {
            position: absolute;
            inset: 0;
            pointer-events: none
        }

        .vine {
            position: absolute;
            opacity: 0;
            will-change: transform, opacity
        }

        .vine path {
            fill: none;
            stroke: #1f7a26;
            stroke-width: 18;
            stroke-linecap: round
        }

        .vine.a {
            top: -10%;
            left: -12%;
            width: 60vw;
            height: 60vh;
            transform: scale(.1) rotate(-30deg) translate(-200px, -160px)
        }

        .vine.b {
            top: -10%;
            right: -12%;
            width: 60vw;
            height: 60vh;
            transform: scale(.1) rotate(30deg) scaleX(-1) translate(-200px, -160px)
        }

        .vine.c {
            bottom: -12%;
            left: -12%;
            width: 60vw;
            height: 60vh;
            transform: scale(.1) rotate(20deg) scaleY(-1) translate(-200px, -160px)
        }

        .vine.d {
            bottom: -12%;
            right: -12%;
            width: 60vw;
            height: 60vh;
            transform: scale(.1) rotate(-20deg) scale(-1) translate(-200px, -160px)
        }

        .vine.e {
            left: 50%;
            top: 50%;
            width: 100vw;
            height: 40vh;
            transform: translate(-50%, -50%) scale(.1)
        }

        .locked .vine {
            animation: vine .55s cubic-bezier(.25, 1.05, .35, 1) forwards
        }

        .locked .vine.b {
            animation-delay: .03s
        }

        .locked .vine.c {
            animation-delay: .06s
        }

        .locked .vine.d {
            animation-delay: .09s
        }

        .locked .vine.e {
            animation-delay: .12s
        }

        @keyframes vine {
            0% {
                opacity: 0
            }

            60% {
                opacity: 1;
                transform: scale(.8)
            }

            100% {
                opacity: 1;
                transform: scale(1)
            }
        }
    </style>
</head>

<body>

    <main id="screen" class="screen">

        <div class="title">スボミーのグッズロック状態管理ツール「グッズロッカー」</div>

        <div class="vine-layer">

            <svg class="vine a" viewBox="0 0 500 500">
                <path d="M20 50 C120 40 180 150 170 250 C160 350 260 380 320 330 C380 280 390 180 460 150" />
            </svg>

            <svg class="vine b" viewBox="0 0 500 500">
                <path d="M18 120 C110 80 160 150 170 250 C182 350 250 395 328 344 C398 299 398 216 470 190" />
            </svg>

            <svg class="vine c" viewBox="0 0 500 500">
                <path d="M28 420 C120 360 170 300 162 228 C152 138 228 96 318 132 C408 170 406 248 470 270" />
            </svg>

            <svg class="vine d" viewBox="0 0 500 500">
                <path d="M32 398 C128 362 150 292 170 232 C204 132 286 88 360 130 C430 170 406 254 472 308" />
            </svg>

            <svg class="vine e" viewBox="0 0 900 300">
                <path d="M10 180 C140 110 240 210 330 150 C430 82 510 246 640 158 C726 100 806 162 890 112" />
            </svg>

        </div>

        <div class="tap-guide">画面をタップしてください</div>

        <div class="goods-lock">Goods<br>Lock!!</div>

        <div class="corner-hint">tap</div>

    </main>

    <script>
        const screen = document.getElementById("screen")
        let locked = false
        let ctx

        function audio() {
            if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)()
            if (ctx.state === 'suspended') ctx.resume()
            return ctx
        }

        function lockSound() {
            const c = audio()
            const t = c.currentTime

            const impact = c.createOscillator()
            const gain = c.createGain()

            impact.type = "triangle"
            impact.frequency.setValueAtTime(120, t)
            impact.frequency.exponentialRampToValueAtTime(40, t + .25)

            gain.gain.setValueAtTime(.001, t)
            gain.gain.exponentialRampToValueAtTime(.7, t + .01)
            gain.gain.exponentialRampToValueAtTime(.001, t + .3)

            impact.connect(gain)
            gain.connect(c.destination)

            impact.start(t)
            impact.stop(t + .3)

            const clang = c.createOscillator()
            const g2 = c.createGain()

            clang.type = "square"
            clang.frequency.setValueAtTime(800, t + .02)
            clang.frequency.exponentialRampToValueAtTime(200, t + .15)

            g2.gain.setValueAtTime(.001, t + .02)
            g2.gain.exponentialRampToValueAtTime(.2, t + .04)
            g2.gain.exponentialRampToValueAtTime(.001, t + .2)

            clang.connect(g2)
            g2.connect(c.destination)

            clang.start(t + .02)
            clang.stop(t + .2)
        }

        function unlockSound() {
            const c = audio()
            const t = c.currentTime
            const o = c.createOscillator()
            const g = c.createGain()

            o.type = "sine"
            o.frequency.setValueAtTime(200, t)
            o.frequency.linearRampToValueAtTime(340, t + .1)

            g.gain.setValueAtTime(.001, t)
            g.gain.exponentialRampToValueAtTime(.12, t + .02)
            g.gain.exponentialRampToValueAtTime(.001, t + .15)

            o.connect(g)
            g.connect(c.destination)

            o.start(t)
            o.stop(t + .15)
        }

        function lock() {
            locked = true
            screen.classList.remove("locked")
            void screen.offsetWidth
            screen.classList.add("locked")
            lockSound()
            if (navigator.vibrate) navigator.vibrate([70, 40, 90])
        }

        function unlock() {
            locked = false
            screen.classList.remove("locked")
            unlockSound()
            if (navigator.vibrate) navigator.vibrate(50)
        }

        screen.onclick = () => locked ? unlock() : lock()
    </script>

</body>

</html>
