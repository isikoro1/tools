<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tools</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
            background: #111;
            color: #fff;
            padding: 24px;
            line-height: 1.6;
        }

        .wrap {
            max-width: 760px;
            margin: 0 auto;
        }

        h1 {
            margin: 0 0 8px;
            font-size: 32px;
        }

        p {
            margin: 0 0 24px;
            color: #cfcfcf;
        }

        .card-list {
            display: grid;
            gap: 16px;
        }

        .card {
            display: block;
            padding: 20px;
            border-radius: 16px;
            background: #1b1b1b;
            color: inherit;
            text-decoration: none;
            border: 1px solid #2a2a2a;
            transition: transform .12s ease, border-color .12s ease, background .12s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            background: #202020;
            border-color: #444;
        }

        .title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .desc {
            color: #bdbdbd;
            font-size: 14px;
        }

        .tag {
            display: inline-block;
            margin-top: 10px;
            font-size: 12px;
            color: #9ad;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>tools</h1>
        <p>公開しているミニツール置き場です。</p>

        <div class="card-list">
            <a class="card" href="./goodslocker/">
                <div class="title">グッズロッカー</div>
                <div class="desc">
                    ポケモンカードのグッズロック状態を忘れないための、タップ式ミニツール。
                </div>
                <div class="tag">HTML / CSS / JavaScript</div>
            </a>
        </div>
    </div>
</body>

</html>
