<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; font-src 'self'; img-src 'self' data: blob:; media-src 'self' blob:; object-src 'none'; base-uri 'none'; form-action 'none'"
    />
    <title>&#x30de;&#x30c8;&#x30ea;&#x30c3;&#x30af;&#x30b9;&#x306e;&#x3042;&#x306e;&#x753b;&#x9762;&#x30b8;&#x30a7;&#x30cd;&#x30ec;&#x30fc;&#x30bf;&#x30fc;</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <canvas id="rainCanvas" aria-label="Matrix style falling text animation"></canvas>

      <section id="controlPanel" class="control-panel" aria-label="Matrix rain settings">
        <div class="panel-header">
          <div>
            <p class="kicker">Matrix Rain</p>
            <h1>&#x30de;&#x30c8;&#x30ea;&#x30c3;&#x30af;&#x30b9;&#x306e;&#x3042;&#x306e;&#x753b;&#x9762;&#x30b8;&#x30a7;&#x30cd;&#x30ec;&#x30fc;&#x30bf;&#x30fc;</h1>
          </div>
          <div class="header-actions">
            <button id="fullscreenBtn" class="icon-button" type="button" title="&#x5168;&#x753b;&#x9762;">F</button>
            <button id="defaultBtn" class="icon-button" type="button" title="&#x521d;&#x671f;&#x5024;">D</button>
            <button id="randomizeBtn" class="icon-button" type="button" title="&#x30e9;&#x30f3;&#x30c0;&#x30e0;&#x8a2d;&#x5b9a;">R</button>
          </div>
        </div>

        <label class="field">
          <span>&#x843d;&#x3068;&#x3059;&#x6587;&#x5b57;</span>
          <textarea id="characters" rows="4" spellcheck="false">ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&amp;*+-=&lt;&gt;[]{}?/\|:;!&#x30a2;&#x30a4;&#x30a6;&#x30a8;&#x30aa;&#x30ab;&#x30ad;&#x30af;&#x30b1;&#x30b3;&#x30b5;&#x30b7;&#x30b9;&#x30bb;&#x30bd;&#x30bf;&#x30c1;&#x30c4;&#x30c6;&#x30c8;&#x30ca;&#x30cb;&#x30cc;&#x30cd;&#x30ce;</textarea>
        </label>
        <label class="field">
          <span>&#x6587;&#x5b57;&#x30d7;&#x30ea;&#x30bb;&#x30c3;&#x30c8;</span>
          <select id="characterPreset">
            <option value="">Custom</option>
            <option value="default">&#x30c7;&#x30d5;&#x30a9;&#x30eb;&#x30c8;</option>
            <option value="matrix" selected>Matrix mix</option>
            <option value="katakana">&#x30ab;&#x30bf;&#x30ab;&#x30ca;</option>
            <option value="symbols">&#x8a18;&#x53f7;</option>
            <option value="alphabet">&#x30a2;&#x30eb;&#x30d5;&#x30a1;&#x30d9;&#x30c3;&#x30c8;</option>
            <option value="kanji">&#x6f22;&#x5b57;</option>
            <option value="greek">&#x30ae;&#x30ea;&#x30b7;&#x30e3;&#x6587;&#x5b57;</option>
            <option value="emoji">&#x7d75;&#x6587;&#x5b57;</option>
            <option value="binary">&#x30d0;&#x30a4;&#x30ca;&#x30ea;</option>
            <option value="korean">&#x97d3;&#x56fd;&#x8a9e;</option>
            <option value="cat">&#x732b;&#x8a9e;</option>
            <option value="siddham">&#x68b5;&#x5b57;</option>
            <option value="hindi">&#x30d2;&#x30f3;&#x30c9;&#x30a5;&#x30fc;&#x8a9e;</option>
            <option value="war">WAR</option>
          </select>
        </label>
        <div class="export-row">
          <label class="field small-field preset-name-field">
            <span>&#x30ab;&#x30b9;&#x30bf;&#x30e0;&#x540d;</span>
            <input id="customPresetName" type="text" placeholder="preset name" />
          </label>
          <button id="addPresetBtn" class="action-button" type="button">Preset add</button>
          <button id="updatePresetBtn" class="action-button" type="button">Preset update</button>
          <button id="deletePresetBtn" class="action-button" type="button">Preset delete</button>
        </div>

        <div class="control-grid">
          <label class="field">
            <span>&#x6587;&#x5b57;&#x30b5;&#x30a4;&#x30ba;</span>
            <input id="fontSize" type="range" min="10" max="34" value="18" />
          </label>
          <label class="field">
            <span>&#x901f;&#x5ea6;&#x4e0b;&#x9650;</span>
            <input id="speedMin" type="range" min="0.5" max="40" step="0.5" value="7" />
          </label>
          <label class="field">
            <span>&#x901f;&#x5ea6;&#x4e0a;&#x9650;</span>
            <input id="speedMax" type="range" min="0.5" max="40" step="0.5" value="18" />
          </label>
          <label class="field">
            <span>&#x901f;&#x5ea6;&#x306e;&#x3070;&#x3089;&#x3064;&#x304d;</span>
            <input id="variance" type="range" min="0" max="200" value="90" />
          </label>
          <label class="field">
            <span>&#x3070;&#x3089;&#x3064;&#x304d;&#x5206;&#x5e03;</span>
            <select id="varianceMode">
              <option value="uniform" selected>Uniform</option>
              <option value="center">Center</option>
              <option value="extreme">Extreme</option>
              <option value="slow">Slow bias</option>
              <option value="fast">Fast bias</option>
            </select>
          </label>
          <label class="field">
            <span>&#x5bc6;&#x5ea6;</span>
            <input id="density" type="range" min="5" max="100" value="88" />
          </label>
          <label class="field">
            <span>&#x6587;&#x5b57;&#x983b;&#x5ea6;</span>
            <input id="frequency" type="range" min="10" max="180" value="100" />
          </label>
          <label class="field">
            <span>&#x6587;&#x5b57;&#x5217;&#x4e0a;&#x9650;&#x6570;</span>
            <input id="displayLimit" type="range" min="1" max="180" value="42" />
          </label>
          <label class="field">
            <span>&#x6b8b;&#x50cf;</span>
            <input id="trail" type="range" min="1" max="80" value="34" />
          </label>
          <label class="field">
            <span>&#x65b9;&#x5411;</span>
            <select id="direction">
              <option value="down" selected>&#x4e0b;</option>
              <option value="up">&#x4e0a;</option>
              <option value="right">&#x53f3;</option>
              <option value="left">&#x5de6;</option>
            </select>
          </label>
          <label class="field">
            <span>&#x6587;&#x5b57;&#x9806;</span>
            <select id="characterOrder">
              <option value="random" selected>Random</option>
              <option value="sequence">Sequence</option>
              <option value="reverse">Reverse</option>
            </select>
          </label>
          <label class="field">
            <span>&#x6587;&#x5b57;&#x9593;&#x9694;</span>
            <input id="rowSpacing" type="range" min="8" max="100" value="35" />
          </label>
          <label class="field">
            <span>&#x6587;&#x5b57;&#x306e;&#x592a;&#x3055;</span>
            <input id="fontWeight" type="range" min="100" max="900" step="100" value="500" />
          </label>
          <label class="field">
            <span>&#x5965;&#x884c;&#x304d;&#x306e;&#x6570;</span>
            <input id="depth" type="range" min="1" max="8" value="2" />
          </label>
          <label class="field">
            <span>&#x5965;&#x884c;&#x304d;&#x306e;&#x5f37;&#x3055;</span>
            <input id="depthStrength" type="range" min="0" max="100" value="36" />
          </label>
          <label class="field">
            <span>&#x5149;&#x5f69;</span>
            <input id="glow" type="range" min="0" max="30" value="8" />
          </label>
          <label class="field">
            <span>&#x6587;&#x5b57;&#x767a;&#x5149;</span>
            <input id="glyphGlow" type="range" min="0" max="1500" value="110" />
          </label>
          <label class="field">
            <span>&#x6587;&#x5b57;&#x307c;&#x304b;&#x3057;</span>
            <input id="glyphBlur" type="range" min="0" max="60" value="4" />
          </label>
        </div>

        <div class="color-row">
          <label class="field color-field">
            <span>&#x6587;&#x5b57;&#x8272;</span>
            <input id="textColor" type="color" value="#00ff66" />
          </label>
          <label class="field color-field">
            <span>&#x5148;&#x982d;&#x8272;</span>
            <input id="headColor" type="color" value="#ddffdd" />
          </label>
          <label class="field color-field">
            <span>&#x80cc;&#x666f;</span>
            <input id="backgroundColor" type="color" value="#000000" />
          </label>
        </div>

        <div class="export-row">
          <label class="field small-field">
            <span>Export FPS</span>
            <select id="gifFps">
              <option value="8">8</option>
              <option value="12" selected>12</option>
              <option value="16">16</option>
              <option value="24">24</option>
              <option value="30">30</option>
            </select>
          </label>
          <label class="field small-field">
            <span>GIF sec</span>
            <select id="gifSeconds">
              <option value="1.5">1.5</option>
              <option value="2" selected>2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="6">6</option>
              <option value="8">8</option>
              <option value="10">10</option>
              <option value="15">15</option>
            </select>
          </label>
          <label class="field small-field">
            <span>Video sec</span>
            <select id="videoSeconds">
              <option value="5">5</option>
              <option value="10">10</option>
              <option value="15" selected>15</option>
              <option value="30">30</option>
              <option value="60">60</option>
            </select>
          </label>
          <button id="exportPngBtn" class="action-button" type="button">PNG</button>
          <button id="exportGifBtn" class="action-button" type="button">GIF</button>
          <button id="exportVideoBtn" class="action-button" type="button">MP4/WebM</button>
          <button id="saveJsonBtn" class="action-button" type="button">JSON save</button>
          <button id="loadJsonBtn" class="action-button" type="button">JSON load</button>
          <input id="loadJsonInput" class="file-input" type="file" accept="application/json,.json" />
        </div>

        <div class="toggle-row">
          <label><input id="paused" type="checkbox" /> &#x4e00;&#x6642;&#x505c;&#x6b62;</label>
        </div>
        <p id="exportStatus" class="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
