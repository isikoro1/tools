<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Matrix Rain Simulator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <canvas id="rainCanvas" aria-label="Matrix style falling text animation"></canvas>

      <section class="control-panel" aria-label="Matrix rain settings">
        <div class="panel-header">
          <div>
            <p class="kicker">Matrix Rain</p>
            <h1>マトリックスのアレシミュレーター</h1>
          </div>
          <button id="randomizeBtn" class="icon-button" type="button" title="ランダム設定">↻</button>
        </div>

        <label class="field">
          <span>落とす文字</span>
          <textarea id="characters" rows="4" spellcheck="false">ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789アイウエオカキクケコサシスセソタチツテトナニヌネノ</textarea>
        </label>

        <div class="control-grid">
          <label class="field">
            <span>文字サイズ</span>
            <input id="fontSize" type="range" min="10" max="34" value="18" />
          </label>
          <label class="field">
            <span>落下速度</span>
            <input id="speed" type="range" min="2" max="28" value="11" />
          </label>
          <label class="field">
            <span>密度</span>
            <input id="density" type="range" min="25" max="100" value="78" />
          </label>
          <label class="field">
            <span>残像</span>
            <input id="trail" type="range" min="4" max="24" value="12" />
          </label>
          <label class="field">
            <span>揺らぎ</span>
            <input id="jitter" type="range" min="0" max="100" value="22" />
          </label>
          <label class="field">
            <span>グロー</span>
            <input id="glow" type="range" min="0" max="24" value="10" />
          </label>
        </div>

        <div class="color-row">
          <label class="field color-field">
            <span>文字色</span>
            <input id="textColor" type="color" value="#00ff66" />
          </label>
          <label class="field color-field">
            <span>先頭色</span>
            <input id="headColor" type="color" value="#ddffdd" />
          </label>
          <label class="field color-field">
            <span>背景</span>
            <input id="backgroundColor" type="color" value="#020403" />
          </label>
        </div>

        <div class="toggle-row">
          <label><input id="katakanaMode" type="checkbox" checked /> カタカナ多め</label>
          <label><input id="paused" type="checkbox" /> 一時停止</label>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
